<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Copilot Agent Mode — 1080×1920 HQ v2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07070f; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:14px; padding:20px; }
.preview-wrap { width:405px; height:720px; position:relative; overflow:hidden; border-radius:14px; box-shadow:0 8px 48px rgba(0,120,212,.3); }
canvas#reel { width:1080px; height:1920px; transform:scale(0.375); transform-origin:top left; display:block; }
.badge { position:absolute; top:8px; right:8px; background:rgba(0,120,212,.9); color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:10px; font-weight:700; padding:3px 10px; border-radius:10px; pointer-events:none; }
.rec-badge { position:absolute; top:8px; left:8px; background:rgba(210,30,30,.9); color:#fff; font-family:'Noto Sans KR',sans-serif; font-size:10px; font-weight:700; padding:3px 10px; border-radius:10px; display:none; animation:blink 1s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.controls { display:flex; gap:10px; }
button { font-family:'Noto Sans KR',sans-serif; font-size:13px; font-weight:700; padding:9px 22px; border-radius:22px; border:none; cursor:pointer; }
.btn-play { background:#fff; color:#000; }
.btn-rec  { background:linear-gradient(135deg,#0078D4,#005a9e); color:#fff; box-shadow:0 4px 18px rgba(0,120,212,.5); }
.btn-rec:disabled { opacity:.4; cursor:not-allowed; }
.info { font-family:'Noto Sans KR',sans-serif; font-size:11px; color:rgba(255,255,255,.4); text-align:center; line-height:1.8; }

/* 화면녹화 파일 드롭 안내 */
.drop-zone { border:1.5px dashed rgba(255,255,255,.15); border-radius:10px; padding:12px 20px; font-family:'Noto Sans KR',sans-serif; font-size:11px; color:rgba(255,255,255,.35); text-align:center; line-height:1.8; max-width:405px; }
</style>
</head>
<body>

<div class="preview-wrap" id="wrap">
  <canvas id="reel" width="1080" height="1920"></canvas>
  <div class="badge">1080×1920 HQ</div>
  <div class="rec-badge" id="recBadge">● REC</div>
</div>

<div class="controls">
  <button class="btn-play" onclick="startPreview()">▶ 미리보기</button>
  <button class="btn-rec" id="btnRec" onclick="startRecord()">📥 고화질 녹화</button>
</div>

<div class="info">
  canvas.captureStream(30) · 8Mbps VP9 · 화면공유 없음<br>
  38초 완료 후 자동 저장: copilot_agent_mode_1080x1920.webm
</div>

<div class="drop-zone">
  📁 화면녹화 파일을 이 폴더에 저장 후 미리보기 재시작<br>
  <b>excel_demo.mp4</b> · <b>word_demo.mp4</b> · <b>ppt_demo.mp4</b>
</div>

<!-- 화면녹화 비디오 요소 (숨김) -->
<video id="vid-excel" src="excel_demo.mp4" muted playsinline preload="auto" style="display:none" loop></video>
<video id="vid-word"  src="word_demo.mp4"  muted playsinline preload="auto" style="display:none" loop></video>
<video id="vid-ppt"   src="ppt_demo.mp4"   muted playsinline preload="auto" style="display:none" loop></video>

<script>
/* ══════════════════════════════════════════════
   기본 설정
══════════════════════════════════════════════ */
const W=1080, H=1920, TOTAL=38000, FPS=30, BITRATE=8_000_000;
const canvas=document.getElementById('reel');
const ctx=canvas.getContext('2d');

/* 비디오 요소 */
const vidExcel=document.getElementById('vid-excel');
const vidWord =document.getElementById('vid-word');
const vidPpt  =document.getElementById('vid-ppt');

/* 비디오 로드 상태 */
const vidReady={excel:false,word:false,ppt:false};
vidExcel.addEventListener('canplay',()=>vidReady.excel=true);
vidWord .addEventListener('canplay',()=>vidReady.word=true);
vidPpt  .addEventListener('canplay',()=>vidReady.ppt=true);

let animFrame=null, startTime=null, isRec=false;

/* ══════════════════════════════════════════════
   유틸
══════════════════════════════════════════════ */
const clamp=(v,a,b)=>Math.min(Math.max(v,a),b);
const lerp=(a,b,t)=>a+(b-a)*clamp(t,0,1);
const easeOut=t=>1-(1-clamp(t,0,1))**2.5;
const easeIn =t=>clamp(t,0,1)**2;
const snap   =t=>{ t=clamp(t,0,1); return t<.5?2*t*t:-1+(4-2*t)*t; };

function rr(x,y,w,h,r,fill,stroke,sw=2){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}
function t(text,x,y,sz,color,align='center',wt='900'){
  ctx.font=`${wt} ${sz}px 'Noto Sans KR',sans-serif`;
  ctx.fillStyle=color; ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.fillText(text,x,y);
}
function sh(c,b){ctx.shadowColor=c;ctx.shadowBlur=b;}
function nsh(){ctx.shadowColor='transparent';ctx.shadowBlur=0;}

/* ══════════════════════════════════════════════
   파티클
══════════════════════════════════════════════ */
const PC=['#0078D4','#4FC3F7','#fff','#81D4FA','#B3E5FC'];
let pts=[];
const newPt=()=>({x:Math.random()*W,y:H+10+Math.random()*200,vy:-(1.5+Math.random()*2.5),r:2+Math.random()*4,op:0,maxOp:.1+Math.random()*.35,c:PC[~~(Math.random()*PC.length)]});
const initPts=()=>{pts=Array.from({length:28},newPt);};
function tickPts(){pts.forEach(p=>{p.y+=p.vy;p.op=Math.min(p.maxOp,p.op+.018);if(p.y<-20)Object.assign(p,newPt());});}
function drawPts(){pts.forEach(p=>{ctx.globalAlpha=p.op;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.fill();});ctx.globalAlpha=1;}

/* ══════════════════════════════════════════════
   Copilot 로고 (캔버스 직접 드로잉)
   공식 컬러: #199fd7 #fc7942 #99bd3c #8a50d8
══════════════════════════════════════════════ */
function drawCopilotLogo(cx,cy,size,alpha=1){
  ctx.save(); ctx.translate(cx,cy); ctx.globalAlpha=alpha;
  const r=size*.42, lw=size*.09;
  const rot=Date.now()/4000;
  const cols=['#199fd7','#fc7942','#99bd3c','#8a50d8'];
  const angles=[0,Math.PI/2,Math.PI,Math.PI*1.5];

  angles.forEach((a,i)=>{
    ctx.beginPath();
    ctx.arc(0,0,r,a+rot,a+rot+Math.PI*.65);
    ctx.strokeStyle=cols[i];
    ctx.lineWidth=lw;
    ctx.lineCap='round';
    sh(cols[i],size*.18);
    ctx.stroke();
    nsh();
  });

  /* 중심 원 */
  ctx.beginPath(); ctx.arc(0,0,size*.1,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fill();
  ctx.restore(); ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════════
   배경 그라디언트
══════════════════════════════════════════════ */
function bg(c1,c2,c3=''){
  const g=ctx.createLinearGradient(0,0,W*.45,H);
  g.addColorStop(0,c1); g.addColorStop(.5,c2); g.addColorStop(1,c3||c1);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

/* ══════════════════════════════════════════════
   공통 고정 레이어
══════════════════════════════════════════════ */
function drawTopBar(a){
  ctx.globalAlpha=a;
  const lb='📱 @ai.saver_';
  ctx.font=`700 34px 'Noto Sans KR',sans-serif`;
  const tw=ctx.measureText(lb).width;
  const bw=tw+86,bh=64,bx=W/2-bw/2,by=44;
  rr(bx,by,bw,bh,32,'rgba(0,0,0,.65)','rgba(255,255,255,.2)',2);
  t(lb,W/2,by+bh/2,34,'#fff','center','700');
  ctx.globalAlpha=1;
}

function drawProgress(p){
  ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.fillRect(0,H-7,W*p,7);
}

function drawPersistentSub(el){ /* 자막 제거됨 */ }

/* ══════════════════════════════════════════════
   씬 1: 오프닝 (0~3s) — 속도 UP
══════════════════════════════════════════════ */
function drawOpening(el){
  const p=el/3000;
  bg('#001233','#003a80','#001233');

  /* 회전 광선 */
  const a=Date.now()/7000*Math.PI*2;
  ctx.save(); ctx.translate(W/2,H*.40); ctx.rotate(a);
  for(let i=0;i<6;i++){
    ctx.rotate(Math.PI/3);
    const g=ctx.createLinearGradient(0,0,680,0);
    g.addColorStop(0,'rgba(0,120,212,.14)'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,680,-.12,.12); ctx.fill();
  }
  ctx.restore();

  /* 글로우 링 */
  const pulse=.88+.12*Math.sin(Date.now()/900);
  ctx.save(); ctx.translate(W/2,H*.40);
  [[340,.32,'#0078D4'],[490,.16,'#4FC3F7']].forEach(([r,op,c])=>{
    ctx.beginPath(); ctx.arc(0,0,r*pulse,0,Math.PI*2);
    ctx.strokeStyle=c; ctx.lineWidth=3; ctx.globalAlpha=op; ctx.stroke();
  });
  ctx.restore(); ctx.globalAlpha=1;

  /* Copilot 로고 */
  const la=easeOut(p*4);
  drawCopilotLogo(W/2,H*.40-260,180,la);

  /* MICROSOFT 레이블 */
  ctx.globalAlpha=easeOut(p*4.5);
  t('MICROSOFT',W/2,H*.40-108,28,'rgba(255,255,255,.5)','center','700');
  ctx.globalAlpha=1;

  /* 타이틀 */
  const ta=easeOut(clamp((p-.08)*5,0,1));
  ctx.globalAlpha=ta;
  t('Copilot',  W/2,H*.40+50,90,'#4FC3F7','center','900');
  t('Agent Mode',W/2,H*.40+162,78,'#fff',   'center','900');
  ctx.globalAlpha=1;

  /* 서브 */
  ctx.globalAlpha=easeOut(clamp((p-.18)*5,0,1));
  t('2026.04.22 정식 출시',W/2,H*.40+256,32,'rgba(255,255,255,.5)','center','700');
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════════
   씬 2: 발표 (3~6s) — 단축 + 속도 UP
══════════════════════════════════════════════ */
function drawAnnounce(el){
  const p=el/3000;
  bg('#000d20','#002060','#000d20');

  const sc=lerp(.86,1,easeOut(p*4));
  ctx.save(); ctx.translate(W/2,H/2); ctx.scale(sc,sc);

  ctx.globalAlpha=clamp(p*8,0,1);
  const bt='⚡ 정식 출시';
  ctx.font=`800 32px 'Noto Sans KR',sans-serif`;
  const btw=ctx.measureText(bt).width;
  rr(-btw/2-50,-400,btw+100,66,33,'#0078D4',null);
  sh('rgba(0,120,212,.7)',22); t(bt,0,-367,32,'#fff','center','800'); nsh();
  ctx.globalAlpha=1;

  ctx.globalAlpha=clamp(p*6,0,1);
  t('4월 22일 · Microsoft 365',0,-296,30,'rgba(255,255,255,.5)','center','700');
  ctx.globalAlpha=1;

  ctx.globalAlpha=clamp(p*5,0,1);
  t('Word · Excel · PPT에', 0,-164,72,'#fff',   'center','900');
  t('AI 에이전트가',        0,-58, 72,'#4FC3F7','center','900');
  t('들어왔습니다',         0, 66, 72,'#fff',   'center','900');
  ctx.globalAlpha=1;

  ctx.globalAlpha=clamp((p-.25)*5,0,1);
  t('이제 AI가 직접 작업합니다',0,196,38,'rgba(255,255,255,.65)','center','700');
  ctx.globalAlpha=1;

  ctx.restore();
}

/* ══════════════════════════════════════════════
   씬 3: 기능 체크리스트 (6~18s) — 화면녹화 배경 포함
   팝업 간격: 2000ms (기존 3200ms → 빠르게)
══════════════════════════════════════════════ */
const FEATS=[
  {app:'EXCEL',   desc:'수식 자동 생성 · 피벗 테이블 · 차트까지', t0:0,   vid:'excel'},
  {app:'WORD',    desc:'보고서 초안 통째로 재작성',               t0:2000, vid:'word'},
  {app:'POWERPOINT', desc:'새 데이터 → 슬라이드 자동 업데이트', t0:4000, vid:'ppt'},
  {app:'전부',    desc:'ChatGPT 창 없이 오피스 안에서 바로',      t0:6000, vid:null},
];

function drawFeatures(el){
  const p=el/12000;
  bg('#000c1e','#001a40','#000c1e');

  /* 헤더 */
  const ha=easeOut(p*8);
  ctx.globalAlpha=ha;
  const ht='COPILOT AGENT MODE';
  ctx.font=`800 27px 'Noto Sans KR',sans-serif`;
  const htw=ctx.measureText(ht).width;
  rr(W/2-htw/2-38,196,htw+76,58,29,'rgba(0,120,212,.22)','rgba(0,120,212,.55)',2);
  t(ht,W/2,225,27,'#4FC3F7','center','800');
  t('명령 하나로',W/2,328,60,'#fff',   'center','900');
  t('전부 됩니다',W/2,404,60,'#4FC3F7','center','900');
  ctx.globalAlpha=1;

  /* 아이템 */
  const IH=192, IW=W-120, IX=60, IY0=500;
  FEATS.forEach((f,i)=>{
    const iel=el-f.t0;
    if(iel<0) return;
    const ip=easeOut(clamp(iel/280,0,1)); // 속도 UP (기존 450)
    const ia=clamp(iel/200,0,1);          // 속도 UP
    ctx.globalAlpha=ia;
    const tx=lerp(-70,0,ip);
    const ty=IY0+i*(IH+18);

    /* 화면녹화 비디오 배경 */
    const vEl= f.vid==='excel'?vidExcel : f.vid==='word'?vidWord : f.vid==='ppt'?vidPpt : null;
    const vReady= f.vid ? vidReady[f.vid] : false;

    if(vReady && vEl){
      /* 비디오 클립 - 아이템 박스 안에 표시 */
      ctx.save();
      ctx.beginPath(); ctx.roundRect(IX+tx,ty,IW,IH,28); ctx.clip();
      ctx.drawImage(vEl,IX+tx,ty,IW,IH);
      /* 반투명 오버레이로 텍스트 가독성 확보 */
      ctx.fillStyle='rgba(0,10,30,.62)'; ctx.fill();
      ctx.restore();
      rr(IX+tx,ty,IW,IH,28,null,'rgba(0,120,212,.4)',2);
    } else {
      /* 플레이스홀더 배경 */
      rr(IX+tx,ty,IW,IH,28,'rgba(0,120,212,.1)','rgba(0,120,212,.28)',2);
    }

    /* 체크 원 */
    const cg=ctx.createLinearGradient(IX+tx+32,ty+42,IX+tx+128,ty+138);
    cg.addColorStop(0,'#0078D4'); cg.addColorStop(1,'#005a9e');
    rr(IX+tx+32,ty+44,100,100,50,cg,null);
    sh('rgba(0,120,212,.55)',16);
    t('✓',IX+tx+82,ty+94,52,'#fff','center','900'); nsh();

    /* 앱 라벨 */
    t(f.app,IX+tx+156,ty+36,27,'#4FC3F7','left','800');

    /* 설명 */
    ctx.font=`700 38px 'Noto Sans KR',sans-serif`;
    ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText(f.desc,IX+tx+156,ty+76,IW-185);

    /* 화면녹화 없을 때 안내 */
    if(!vReady && f.vid){
      ctx.font=`600 22px 'Noto Sans KR',sans-serif`;
      ctx.fillStyle='rgba(79,195,247,.6)'; ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText(`📹 ${f.vid}_demo.mp4`,IX+tx+156,ty+148);
    }

    ctx.globalAlpha=1;
  });
}

/* ══════════════════════════════════════════════
   씬 4: 통계 그래프 (18~24s) — 신규 씬
   데이터: Microsoft/Forrester 생산성 데이터
══════════════════════════════════════════════ */
function drawStats(el){
  const p=el/6000;
  bg('#000c1e','#001830','#000c1e');

  ctx.globalAlpha=easeOut(p*6);
  t('생산성 향상 데이터',W/2,188,30,'rgba(255,255,255,.5)','center','700');
  t('Copilot 도입 시',W/2,268,60,'#fff',   'center','900');
  t('이렇게 달라집니다',W/2,346,60,'#4FC3F7','center','900');
  ctx.globalAlpha=1;

  /* 바 차트 */
  const bars=[
    {label:'Word', sublabel:'문서 작성 속도', pct:55, color:'#4FC3F7', t0:400},
    {label:'Excel',sublabel:'데이터 분석 속도',pct:35, color:'#0078D4', t0:1200},
    {label:'PPT',  sublabel:'슬라이드 제작',   pct:45, color:'#8a50d8', t0:2000},
  ];

  const bw=220, bh=52, bx=160, gapY=160;
  const maxBarW=680;

  bars.forEach((b,i)=>{
    const bel=el-b.t0;
    if(bel<0) return;
    const ba=easeOut(clamp(bel/250,0,1));
    const bp=easeOut(clamp((bel-100)/700,0,1));
    const ty2=500+i*gapY;

    ctx.globalAlpha=ba;
    /* 라벨 */
    t(b.label,   bx-20,ty2,38,'#fff',  'right','900');
    t(b.sublabel,bx-20,ty2+44,24,'rgba(255,255,255,.5)','right','600');

    /* 배경 바 */
    rr(bx,ty2-bh/2,maxBarW,bh,bh/2,'rgba(255,255,255,.07)',null);
    /* 채워지는 바 */
    const fw=maxBarW*(b.pct/100)*bp;
    if(fw>bh/2){
      const barGrad=ctx.createLinearGradient(bx,0,bx+fw,0);
      barGrad.addColorStop(0,b.color); barGrad.addColorStop(1,b.color+'88');
      rr(bx,ty2-bh/2,fw,bh,bh/2,barGrad,null);
      sh(b.color,12);
      rr(bx,ty2-bh/2,fw,bh,bh/2,barGrad,null);
      nsh();
    }
    /* % 텍스트 */
    const dispPct=Math.round(b.pct*bp);
    ctx.globalAlpha=ba;
    t(`+${dispPct}%`,bx+maxBarW+24,ty2,42,b.color,'left','900');
    ctx.globalAlpha=1;
  });

  /* 출처 */
  ctx.globalAlpha=easeOut(clamp((p-.6)*4,0,1));
  t('* Microsoft/Forrester 생산성 리서치 기준',W/2,1060,24,'rgba(255,255,255,.35)','center','600');
  ctx.globalAlpha=1;

  /* 보조 통계 */
  ctx.globalAlpha=easeOut(clamp((p-.55)*4,0,1));
  const sx=120, sy2=1110, sw=840/3-20;
  const stats=[
    {n:'2,000만',d:'주간 활성 사용자'},
    {n:'1,500만',d:'유료 M365 시트'},
    {n:'35.8%',  d:'직장 전환율'},
  ];
  stats.forEach((s,i)=>{
    const sx2=sx+i*(sw+30);
    rr(sx2,sy2,sw,140,18,'rgba(0,120,212,.12)','rgba(0,120,212,.3)',1.5);
    t(s.n,sx2+sw/2,sy2+48,36,'#4FC3F7','center','900');
    t(s.d,sx2+sw/2,sy2+96,22,'rgba(255,255,255,.6)','center','600');
  });
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════════
   씬 5: 사이드바 (24~30s) — 속도 UP
══════════════════════════════════════════════ */
const STEPS=[
  {text:'데이터 분석 완료',   st:'done',  t0:0},
  {text:'수식 생성 완료',     st:'done',  t0:400},
  {text:'피벗 테이블 생성 중…',st:'active',t0:700},
  {text:'차트 완성',          st:'wait',  t0:1400},
];

function drawSidebar(el){
  const p=el/6000;
  bg('#000c1e','#001830','#000c1e');

  ctx.globalAlpha=easeOut(p*6);
  const lt='AGENT SIDEBAR';
  ctx.font=`800 27px 'Noto Sans KR',sans-serif`;
  const ltw=ctx.measureText(lt).width;
  rr(W/2-ltw/2-38,188,ltw+76,58,29,'rgba(0,120,212,.2)','rgba(0,120,212,.5)',2);
  t(lt,W/2,217,27,'#81D4FA','center','800');
  t('AI가 뭘 하는지',     W/2,340,66,'#fff',   'center','900');
  t('실시간으로 보입니다',W/2,426,66,'#4FC3F7','center','900');
  ctx.globalAlpha=1;

  const sa=easeOut(clamp((p-.15)*5,0,1));
  ctx.globalAlpha=sa;
  const sx=80, sy=530, sw=W-160, sh2=560;
  rr(sx,sy,sw,sh2,26,'rgba(255,255,255,.04)','rgba(255,255,255,.1)',2);
  t('📋 Copilot 작업 진행 중…',sx+34,sy+50,31,'#4FC3F7','left','700');
  ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(sx+22,sy+90); ctx.lineTo(sx+sw-22,sy+90); ctx.stroke();
  ctx.globalAlpha=1;

  STEPS.forEach((st,i)=>{
    const sel=el-st.t0;
    if(sel<0) return;
    const sfa=clamp(sel/280,0,1)*sa;
    ctx.globalAlpha=sfa;
    const sty=sy+118+i*108;
    let dc='#222';
    if(st.st==='done')   dc='#22C55E';
    else if(st.st==='active'){ dc='#FFD740'; const bl=.4+.6*Math.abs(Math.sin(Date.now()/430)); ctx.globalAlpha=sfa*bl; }
    ctx.beginPath(); ctx.arc(sx+50,sty+18,13,0,Math.PI*2);
    ctx.fillStyle=dc;
    if(st.st!=='wait'){sh(dc,11);}
    ctx.fill(); nsh(); ctx.globalAlpha=sfa;
    ctx.font=`${st.st==='active'?'700':'600'} 36px 'Noto Sans KR',sans-serif`;
    ctx.fillStyle=st.st==='done'?'rgba(255,255,255,.38)':st.st==='active'?'#fff':'rgba(255,255,255,.28)';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(st.text,sx+84,sty+18);
    if(st.st==='done'){
      const tw2=ctx.measureText(st.text).width;
      ctx.strokeStyle='rgba(255,255,255,.38)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(sx+84,sty+18); ctx.lineTo(sx+84+tw2,sty+18); ctx.stroke();
    }
    ctx.globalAlpha=1;
  });

  const ba=easeOut(clamp((p-.55)*4,0,1));
  ctx.globalAlpha=ba;
  t('중간에 멈추거나',W/2,1148,42,'rgba(255,255,255,.65)','center','600');
  t('되돌리기도 됩니다',W/2,1210,42,'#fff','center','800');
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════════
   씬 6: M365 호환 (30~35s)
══════════════════════════════════════════════ */
function drawCompat(el){
  const p=el/5000;
  bg('#000c1e','#001a40','#000c1e');
  const tv=easeOut(clamp(p*4,0,1));
  ctx.globalAlpha=tv;
  const bounce=Math.sin(Date.now()/680)*16;
  ctx.font=`900 126px 'Noto Sans KR',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🎯',W/2,310+bounce);
  t('Microsoft 365',W/2,516,70,'#fff',   'center','900');
  t('구독자라면',    W/2,608,70,'#4FC3F7','center','900');
  t('지금 바로 됩니다',W/2,700,70,'#FFD740','center','900');
  t('추가 비용 없이 · 활성화 방법만 알면 끝',W/2,808,36,'rgba(255,255,255,.58)','center','600');
  ctx.globalAlpha=1;

  const ba=easeOut(clamp((p-.28)*4,0,1));
  ctx.globalAlpha=ba;
  const bx=80,by=900,bw=W-160,bh=380;
  rr(bx,by,bw,bh,30,'rgba(0,120,212,.12)','rgba(0,120,212,.45)',3);
  t('사용 가능 앱',bx+32,by+38,27,'#4FC3F7','left','800');
  ['Word · Excel · PowerPoint','기존 M365 구독자 바로 사용','활성화 방법 모르는 분 많음'].forEach((item,i)=>{
    const iy=by+104+i*96;
    ctx.beginPath(); ctx.arc(bx+46,iy+22,12,0,Math.PI*2);
    ctx.fillStyle='#22C55E'; sh('#22C55E',9); ctx.fill(); nsh();
    t(item,bx+78,iy+22,36,'#fff','left','700');
  });
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════════
   씬 7: CTA (35~38s)
══════════════════════════════════════════════ */
function drawCTA(el){
  const p=el/3000;
  bg('#000510','#001030','#000510');
  ctx.fillStyle='rgba(0,5,20,.5)'; ctx.fillRect(0,0,W,H);
  const tv=easeOut(clamp(p*3,0,1));
  ctx.globalAlpha=tv;
  const bx=60,by=H/2-520,bw=W-120,bh=1040;
  rr(bx,by,bw,bh,44,'rgba(0,5,20,.82)','rgba(0,120,212,.38)',2);
  ctx.font=`900 108px 'Noto Sans KR',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('💬',W/2,by+122);
  t('활성화 방법 +',        W/2,by+252,56,'#fff',   'center','900');
  t('직장인 활용 사례 3가지',W/2,by+332,56,'#4FC3F7','center','900');
  t('DM으로 드립니다',      W/2,by+412,56,'#fff',   'center','900');

  const pu=.7+.3*Math.sin(Date.now()/500);
  const kg=ctx.createLinearGradient(bx+70,by+472,bx+bw-70,by+592);
  kg.addColorStop(0,'#0078D4'); kg.addColorStop(1,'#005a9e');
  rr(bx+70,by+474,bw-140,118,28,kg,null);
  sh(`rgba(0,120,212,${pu})`,36);
  t('코파일럿',W/2,by+533,78,'#fff','center','900'); nsh();

  t('댓글에 위 단어만 남겨주세요',W/2,by+650,36,'rgba(255,255,255,.65)','center','600');
  t('바로 DM 드립니다',          W/2,by+712,36,'rgba(255,255,255,.65)','center','600');

  /* Copilot 로고 작게 */
  drawCopilotLogo(W/2,by+822,80,1);
  t('@ai.saver_',W/2,by+882,50,'#fff','center','900');
  ctx.globalAlpha=1;
}

/* ══════════════════════════════════════════════
   메인 루프
══════════════════════════════════════════════ */
function frame(ts){
  if(!startTime) startTime=ts;
  const el=ts-startTime;
  const prog=Math.min(el/TOTAL,1);

  ctx.clearRect(0,0,W,H);
  tickPts();

  if     (el<3000)  drawOpening(el);
  else if(el<6000)  drawAnnounce(el-3000);
  else if(el<18000) drawFeatures(el-6000);
  else if(el<24000) drawStats(el-18000);
  else if(el<30000) drawSidebar(el-24000);
  else if(el<35000) drawCompat(el-30000);
  else              drawCTA(el-35000);

  drawPts();
  drawTopBar(Math.min(1,el/400));
  drawPersistentSub(el);   // ← 하단 자막 항상 표시
  drawProgress(prog);

  if(el<TOTAL+600) animFrame=requestAnimationFrame(frame);
}

function stopAnim(){ if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;} startTime=null; }

function startPreview(){
  stopAnim(); initPts();
  /* 비디오 재생 시작 */
  [vidExcel,vidWord,vidPpt].forEach(v=>{ v.currentTime=0; v.play().catch(()=>{}); });
  animFrame=requestAnimationFrame(frame);
}

async function startRecord(){
  const btn=document.getElementById('btnRec');
  const badge=document.getElementById('recBadge');
  if(isRec) return; isRec=true;
  btn.disabled=true; badge.style.display='block';
  await document.fonts.load(`900 40px 'Noto Sans KR'`);
  const stream=canvas.captureStream(FPS);
  const mime=MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:BITRATE});
  const chunks=[];
  rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  rec.onstop=()=>{
    const blob=new Blob(chunks,{type:'video/webm'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='copilot_agent_mode_1080x1920.webm';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    badge.style.display='none'; btn.disabled=false; isRec=false;
  };
  rec.start(100);
  stopAnim(); initPts();
  [vidExcel,vidWord,vidPpt].forEach(v=>{ v.currentTime=0; v.play().catch(()=>{}); });
  animFrame=requestAnimationFrame(frame);
  setTimeout(()=>{ stopAnim(); rec.stop(); }, TOTAL+600);
}

window.addEventListener('load',()=>{
  document.fonts.load(`900 40px 'Noto Sans KR'`).then(()=>{
    initPts();
    startTime=performance.now();
    requestAnimationFrame(t=>{ frame(t); cancelAnimationFrame(animFrame); startTime=null; });
  });
});
</script>
